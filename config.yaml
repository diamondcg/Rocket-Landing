simulation:
  dt: 0.01          # time step [s]
  t_max: 30.0       # max simulation time [s]

rocket:
  gravity: 9.81     # gravitational acceleration [m/s^2]
  alpha: 0.0005     # fuel consumption coefficient [kg/(N·s)]
  mass_dry: 10.0    # dry mass [kg]
  mass_init: 20.0   # initial mass (dry + fuel) [kg]
  z_init: 100.0     # initial altitude [m]
  v_init: -10.0     # initial velocity [m/s] (negative = downward)
  thrust_min: 0.0   # minimum thrust [N]
  thrust_max: 500.0 # maximum thrust [N]

controller:
  type: pid         # 'pid' or 'lqr'
  pid:
    Kp: 2.0
    Ki: 0.5
    Kd: 100.0
  lqr:
    Q: [100.0, 1.0] # state cost weights [z, v]
    R: 0.01         # control cost weight

estimator:
  Q_proc: [0.01, 0.01, 0.0]  # process noise covariance diagonal [z, v, mass]
  R_meas: 1.0                 # measurement noise variance [m^2]
  P_init: [10.0, 1.0, 0.1]   # initial state error covariance diagonal

noise:
  measurement_std: 1.0  # position measurement std [m]

monte_carlo:
  n_runs: 1000
  z_init_mean: 100.0
  z_init_std: 5.0
  v_init_mean: -10.0
  v_init_std: 1.0
  mass_init_mean: 20.0
  mass_init_std: 1.0
  success_position_threshold: 0.1  # [m]

visualization:
  window_width: 800     # window width [px]
  window_height: 600    # window height [px]
  window_title: "Rocket Landing"
  fps: 60                # target render frame rate
  playback_speed: 1.0    # 1.0 = real time, >1 = faster
  loop: false            # restart playback when finished
  view_padding_frac: 0.1 # fractional padding for altitude view bounds
  rocket_width: 0.06     # rocket body width [NDC units]
  rocket_height: 0.15    # rocket body height [NDC units]
  hud:
    enabled: true
    font_path: "/home/sbryant/.fonts/Caskaydia Cove Nerd Font Complete Mono SemiLight.otf"
    font_size_px: 18        # font size used to rasterize glyphs [px]
    text_height: 0.045      # rendered text height [NDC]
    margin: 0.04            # screen-edge margin [NDC]
    arrow_max_force: 250.0  # force [N] that maps to arrow_max_length
    arrow_max_length: 0.22  # arrow length at arrow_max_force [NDC]
    arrow_shaft_width: 0.01 # arrow shaft line width [NDC]
    fuel_bar_width: 0.04    # fuel gauge width [NDC]
    fuel_bar_height: 0.5    # fuel gauge height [NDC]
  colors:
    background: [0.05, 0.05, 0.1]
    ground: [0.4, 0.3, 0.2]
    rocket: [0.9, 0.9, 0.9]
    flame: [1.0, 0.5, 0.0]
    axis: [0.6, 0.6, 0.6]
    text: [0.9, 0.9, 0.9]
    weight_arrow: [1.0, 0.3, 0.3]
    thrust_arrow: [0.3, 0.6, 1.0]
    net_arrow: [0.9, 0.9, 0.3]
    fuel_bar_bg: [0.3, 0.3, 0.3]
    fuel_bar_fill: [0.3, 0.9, 0.3]
